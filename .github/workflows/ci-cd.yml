name: IterForge Comprehensive CI/CD

on:
  push:
    branches: [main, dev, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  # ── TIER 1: FAST CHECKS ─────────────────────────────────────────────────────
  # These run on every push to catch errors immediately.
  fast-checks:
    name: Tier 1 - Fast Checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: node test/runner.js --category=unit

      - name: Frontend Build Verification
        run: npm run build:frontend

  # ── TIER 2: STAGING & INTEGRATION ───────────────────────────────────────────
  # These run on PRs to main or pushes to dev. They are more "expensive".
  integration-staging:
    name: Tier 2 - Staging & Integration
    needs: fast-checks
    if: github.ref == 'refs/heads/dev' || github.base_ref == 'main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm install

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/3d/masterforge/requirements.txt || echo "No requirements.txt found or failed, skipping..."

      - name: Run Integration Tests
        run: node test/runner.js --category=integration

      - name: Run API Tests
        run: node test/runner.js --category=api

  # ── TIER 3: PACKAGING VERIFICATION ──────────────────────────────────────────
  # Ensures the final application can actually be built into an installer.
  build-verification:
    name: Tier 3 - Packaging Verification
    needs: integration-staging
    if: github.base_ref == 'main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: "Dry-Run Build (Windows)"
        run: |
          npm run build:frontend
          # We run the builder without signing to verify the packaging logic
          npx electron-builder --win --dir
